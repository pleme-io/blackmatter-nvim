schema_version: 1
manifest:
  name: blackmatter-nvim
  kind: BlackmatterComponent
  archetype: blackmatter-component-custom-package-hm
  description: Curated neovim distribution (blnvim) with 55 plugins (lazy.nvim + Nix).
  custom_flake: true
  custom_flake_reason: |
    Package + HM module + overlay; callPackage pattern so system overlays propagate
    into plugin builds. Canonical and stable — not worth migrating.
dimensions:
  vocabulary: [neovim, blnvim, lazy-nvim, treesitter]
  domains: [Nix, Lua]
  stack: [HomeManager]
  modules:
    home_manager: module/
  render:
    produces:
      - "pkgs.blnvim (standalone editor binary)"
      - "~/.config/nvim/*"
  compliance:
    satisfies: []
    participates: []
  dag:
    inputs: [nixpkgs]
  attestation: { merkle_root: null, signed_by: null, producer: custom-flake }
